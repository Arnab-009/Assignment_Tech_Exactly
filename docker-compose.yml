# =============================================================================
# Document Summarizer — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker compose up --build
#   3. Open http://localhost:8080
# =============================================================================

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docsum-backend
    env_file: .env
    environment:
      GOOGLE_REDIRECT_URI: "http://localhost:8080/api/auth/callback"
      POST_LOGIN_REDIRECT: "http://localhost:8080"
      CORS_ORIGINS: "http://localhost:8080"
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── React Frontend (Vite build → shared volume) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docsum-frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: docsum-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  frontend_dist:
    driver: local
