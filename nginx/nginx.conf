server {
    listen 80;
    server_name localhost;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── API / backend proxy ──────────────────────────────────────────────────
    # All /api requests are forwarded to the FastAPI backend container.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeout for the summarization pipeline (LLM calls can take a while)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering for streaming responses (export downloads)
        proxy_buffering off;
    }

    # ── Frontend (React SPA) ─────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # Client-side routing: serve index.html for any path not matching a file
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
